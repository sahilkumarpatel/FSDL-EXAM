<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }
        .navbar {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .menu li {
            position: relative;
            cursor: pointer;
        }
        .menu a {
            color: white;
            text-decoration: none;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            background: white;
            color: black;
            top: 30px;
            left: 0;
            min-width: 120px;
            border-radius: 5px;
            overflow: hidden;
        }
        .dropdown-menu a {
            display: block;
            padding: 10px;
            color: black;
        }
        .dropdown:hover .dropdown-menu {
            display: block;
        }
        .dropdown-menu a:hover {
            background-color: #f0f0f0;
        }
        .hamburger {
            display: none;
            font-size: 22px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .menu {
                display: none;
                flex-direction: column;
                background: #007BFF;
                width: 100%;
            }
            .menu.show {
                display: flex;
            }
            .hamburger {
                display: block;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div><b>MySite</b></div>
            <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
            <ul class="menu" id="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li class="dropdown">
                    <a href="#">Services</a>
                    <div class="dropdown-menu">
                        <a href="#">Web Design</a>
                        <a href="#">Development</a>
                        <a href="#">Marketing</a>
                    </div>
                </li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>
    <script>
        function toggleMenu() {
            let menu = document.getElementById('menu');
            menu.classList.toggle('show');
        }
    </script>
</body>
</html>
