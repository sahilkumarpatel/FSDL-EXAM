<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #f4f6f8;
            font-family: Arial;
            margin: 30px;
        }

        h1 {
            text-align: center;
        }
        .skill-container {
            margin: 20px auto;
            width: 70%;
        }
        .skill-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .skill-bar {
            background-color: #c2b9b9;
            border-radius: 20px;
            overflow: hidden;
        }
        .skill-fill {
            background-color: #4CAF50;
            height: 30px;
            width: 0;
            line-height: 30px;
            color: white;
            text-align: right;
            padding-right: 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>Skill Bar Component</h1>
    <div id="skills"></div>
    <script>
        function createSkillBar(skill, percentage) {
            let container = document.createElement('div');
            container.className = 'skill-container';

            let name = document.createElement('div');
            name.className = 'skill-name';
            name.innerText = skill;

            let bar = document.createElement('div');
            bar.className = 'skill-bar';

            let fill = document.createElement('div');
            fill.className = 'skill-fill';
            fill.style.width = percentage + '%';
            fill.innerText = percentage + '%';

            bar.appendChild(fill);
            container.appendChild(name);
            container.appendChild(bar);

            document.getElementById('skills').appendChild(container);
        }

        createSkillBar('HTML', 90);
        createSkillBar('CSS', 80);
        createSkillBar('JavaScript', 70);
        createSkillBar('Python', 60);
        createSkillBar('Java', 50);
    </script>
</body>
</html>
