<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Bar Component</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .box {
            max-width: 500px;
        }

        input,
        button {
            padding: 8px;
            margin: 5px 0;
        }

        .skill {
            margin-top: 12px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .bar {
            width: 100%;
            height: 18px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0;
            background: #4caf50;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Skill Bar Component</h2>

        <input type="text" id="skillName" placeholder="Skill name">
        <input type="number" id="percent" placeholder="Percentage (0-100)">
        <button onclick="addSkill()">Add Skill</button>

        <div id="list"></div>
    </div>

    <script>
        // Reusable function: create one skill bar from name and percentage
        function createSkillBar(name, percent) {
            return `
                <div class="skill">
                    <div class="row">
                        <span>${name}</span>
                        <span>${percent}%</span>
                    </div>
                    <div class="bar">
                        <div class="fill" style="width:${percent}%"></div>
                    </div>
                </div>
            `;
        }

        function addSkill() {
            const name = document.getElementById("skillName").value.trim();
            const percent = Number(document.getElementById("percent").value);

            if (!name || percent < 0 || percent > 100 || Number.isNaN(percent)) {
                alert("Enter valid skill name and percentage (0-100)");
                return;
            }

            document.getElementById("list").innerHTML += createSkillBar(name, percent);
            document.getElementById("skillName").value = "";
            document.getElementById("percent").value = "";
        }
    </script>
</body>
</html>
