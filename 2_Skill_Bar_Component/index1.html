<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Bar Component</title>
    <style>
        body {
            font-family: Times New Roman;
            margin: 10px;
        }
        input {
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        label {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="form">
    <label for="skillName">Skill Name: 
    <input type="text" id="skillName" placeholder="Enter the skill name .."><br>
    </label>
    <label for="percentage">Percentage: 
    <input type="number" id="percentage" placeholder="Enter proficiency percentage">
    </label>
</div>
</body>
</html>
