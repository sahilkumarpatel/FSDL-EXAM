<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f1ea;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color:rgb(83, 93, 93)
        }
        .gallery {
            display: flex;
            flex-wrap:wrap;
            justify-content: center;
            gap:20px;
        }
        .card {
            background: white;
            width:220px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .card img 
        {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        .price {
            color: #007BFF;
            font-weight: bold;
            margin: 10px 0;
        }
        button 
        {
            padding: 8px 15px;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <h1>Product Gallery</h1>
    <div class="gallery" id="productContainer"></div>
    <script>
        const products = [
            {name: "Laptop", price:"₹50000",image:"/Problem6/fear3.jpg"},
            {name: "SmartPhone", price:"₹20000",image:"/Problem6/sad1.jpg"},
            {name: "Watch", price:"₹10000",image:"/Problem6/surprise1.jpg"},
            {name: "HeadPhones", price:"₹5000",image:"/Problem6/happy.jpg"}
            ];
            function displayProducts() {
                let container = document.getElementById("productContainer");
                products.forEach(product => {
                    let card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <img src="${product.image}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p>${product.price}</p>
                        <button onclick="addToCart('${product.name}')">Add to Cart</button>
                    `;
                    container.appendChild(card);
                });
                
            }
            function addToCart(name)
                {
                    alert(name + " added to cart!");
                }
            displayProducts();
    </script>
</body>
</html>
