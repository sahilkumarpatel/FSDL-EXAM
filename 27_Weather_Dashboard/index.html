<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:sans-serif; background:#f4f7f6; padding:20px;}
    h2{text-align:center; color:#333;}
    .dashboard{display:flex; flex-wrap:wrap; gap:20px; justify-content:center;}
    .card{background:#fff; padding:20px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.05); width:400px;}
  </style>
</head>
<body>
  <h2>Weekly Weather Dashboard</h2>
  <div class="dashboard">
    <div class="card"><h3>Temperature Trend</h3><canvas id="lineChart"></canvas></div>
    <div class="card"><h3>Rainfall Outlook</h3><canvas id="barChart"></canvas></div>
    <div class="card"><h3>Weather Conditions</h3><canvas id="pieChart"></canvas></div>
  </div>
  <script>
    const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    
    // Line Chart (Temp)
    new Chart(document.getElementById('lineChart'), {
      type: 'line', 
      data: {labels: days, datasets: [{label:'Temp (°C)', data:[22,25,24,20,19,23,26], borderColor:'#ff5722', tension:0.3}]}
    });
    
    // Bar Chart (Rain)
    new Chart(document.getElementById('barChart'), {
      type: 'bar', 
      data: {labels: days, datasets: [{label:'Rainfall (mm)', data:[5,0,2,15,20,0,0], backgroundColor:'#03a9f4'}]}
    });
    
    // Pie Chart (Conditions)
    new Chart(document.getElementById('pieChart'), {
      type: 'pie', 
      data: {labels: ['Sunny', 'Cloudy', 'Rainy'], datasets: [{data: [4, 1, 2], backgroundColor: ['#ffc107', '#9e9e9e', '#03a9f4']}]}
    });
  </script>
</body></html>
